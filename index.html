<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StayFlow</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{

background:#000;
color:white;
min-height:100vh;
overflow-x:hidden;

}


/* HEADER */

header{

height:90px;
display:flex;
align-items:center;
justify-content:center;

}


/* LOGO */

.logo{

font-size:42px;
font-weight:800;
letter-spacing:-2px;

}


.logo span{

color:#008cff;

}



/* HERO */

.hero{

min-height:75vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;

padding:20px;

}



.hero h1{

font-size:64px;
line-height:1.05;
max-width:850px;

}


.hero h1 span{

color:#008cff;

}


.hero p{

margin-top:25px;
font-size:20px;
color:#9ca3af;
max-width:600px;

}


/* BOTAO */

.button{

margin-top:40px;

padding:16px 40px;

background:#008cff;

border-radius:40px;

color:white;

text-decoration:none;

font-weight:bold;

box-shadow:0 0 25px rgba(0,140,255,.35);

}




/* CARDS */

.cards{

display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;

padding:50px 8%;

}



.card{

width:280px;

background:#050505;

padding:35px;

border-radius:20px;


/* linha fina */

border:1px solid rgba(0,140,255,.25);


}



.card h3{

color:#008cff;
margin-bottom:15px;

}



.card p{

color:#9ca3af;
line-height:1.5;

}



@media(max-width:700px){

.hero h1{

font-size:42px;

}

}



</style>

</head>


<body>


<header>

<div class="logo">

Stay<span>Flow</span>

</div>

</header>



<section class="hero">


<h1>

AI powered <span>reservation engine</span>

</h1>


<p>

More bookings, less work with intelligent automation.

</p>


<a class="button" href="#">

Book a Demo

</a>


</section>



<section class="cards">


<div class="card">

<h3>AI Assistant</h3>

<p>

Automate guest conversations 24/7.

</p>

</div>



<div class="card">

<h3>Instant Replies</h3>

<p>

Reply faster and never lose reservations.

</p>

</div>



<div class="card">

<h3>More Bookings</h3>

<p>

Turn messages into confirmed stays.

</p>

</div>


</section>


</body>
</html>
