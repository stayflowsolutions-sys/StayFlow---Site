<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>StayFlow Login</title>


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

height:100vh;

background:#050505;

color:white;

font-family:Arial, Helvetica, sans-serif;

display:flex;

align-items:center;

justify-content:center;

}



.login-container{

width:390px;

background:#0b0d12;

border:1px solid #1b2535;

border-radius:30px;

padding:35px;

box-shadow:0 0 40px rgba(13,110,253,.15);

}




.logo{

text-align:center;

font-size:34px;

font-weight:800;

margin-bottom:10px;

}



.logo span{

color:#0D6EFD;

}





.subtitle{

text-align:center;

color:#9ba3b2;

margin-bottom:30px;

}




label{

font-size:14px;

color:#9ba3b2;

}




input,
select{


width:100%;

padding:14px;

margin-top:8px;

margin-bottom:20px;

border-radius:15px;

border:1px solid #1b2535;

background:#050505;

color:white;

outline:none;


}




button{


width:100%;

padding:15px;

border:none;

border-radius:20px;

background:#0D6EFD;

color:white;

font-weight:bold;

cursor:pointer;

font-size:16px;


}



button:hover{

opacity:.9;

}



.footer{

margin-top:25px;

text-align:center;

color:#667085;

font-size:13px;

}



</style>


</head>



<body>



<div class="login-container">



<div class="logo">

Stay<span>Flow</span>

</div>



<div class="subtitle">

Smart Stay Solutions

</div>





<label>

Hostel

</label>


<select id="hostel">


<option>
Hostel Lagares
</option>


<option>
Demo Hostel
</option>


</select>







<label>

Email

</label>


<input 
id="email"
placeholder="email@hostel.com"
>






<label>

Password

</label>


<input

id="password"

type="password"

placeholder="••••••••"

>







<label>

Language

</label>


<select id="language">


<option value="en">

English

</option>


<option value="es">

Español

</option>


<option value="pt">

Português

</option>


</select>







<button onclick="login()">

Enter StayFlow

</button>







<div class="footer">

AI powered hostel operations

</div>






</div>







<script>



function login(){


const user = {


name:"Carlos",


role:"Owner",


hostel:
document.getElementById("hostel").value,


language:
document.getElementById("language").value


};



localStorage.setItem(
"stayflowUser",
JSON.stringify(user)
);




window.location.href="dashboard.html";



}




</script>






</body>

</html>
