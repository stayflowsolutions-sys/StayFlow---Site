<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>StayFlow | Client Login</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

min-height:100vh;

background:#050505;

color:white;

font-family:Arial, Helvetica, sans-serif;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

}



body::before{

content:"";

position:fixed;

inset:0;

border:1px solid rgba(13,110,253,.18);

box-shadow:
inset 0 0 18px rgba(13,110,253,.06);

pointer-events:none;

}



.login-wrapper{

width:100%;

max-width:430px;

padding:25px;

position:relative;

z-index:2;

}



.login-brand{

text-align:center;

font-size:42px;

font-weight:bold;

margin-bottom:35px;

}



.login-brand span{

color:#0D6EFD;

}



.login-card{

background:#0d0f14;

border:1px solid #1b2535;

border-radius:30px;

padding:40px;

box-shadow:
0 0 45px rgba(13,110,253,.12);

}



.login-card h1{

font-size:32px;

margin-bottom:15px;

}



.login-text{

color:#9ba3b2;

line-height:1.6;

margin-bottom:30px;

}



label{

display:block;

color:#9ba3b2;

font-size:14px;

margin-bottom:8px;

}



input{

width:100%;

padding:16px;

margin-bottom:20px;

background:#050505;

border:1px solid #1b2535;

border-radius:15px;

color:white;

outline:none;

}



input:focus{

border-color:#0D6EFD;

}



.login-btn{

width:100%;

padding:17px;

border:none;

border-radius:50px;

background:#0D6EFD;

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

box-shadow:
0 0 25px rgba(13,110,253,.35);

}



.back{

text-align:center;

margin-top:25px;

}



.back a{

color:#9ba3b2;

text-decoration:none;

font-size:14px;

}


</style>


</head>


<body>



<div class="login-wrapper">


<div class="login-brand">

Stay<span>Flow</span>

</div>


<div class="login-card">

<h1>

Welcome Back

</h1>





<p class="login-text">

Access your StayFlow workspace
and manage your hostel operations.

</p>







<label>

Email

</label>




<input

type="email"

placeholder="you@hostel.com"

>







<label>

Password

</label>




<input

type="password"

placeholder="Enter your password"

>








<button

class="login-btn"

type="button"

onclick="window.location.href='dashboard.html'">

Sign In

</button>









<div class="back">


<a href="index.html">

← Back to StayFlow website

</a>



</div>







</div>






</div>







</body>

</html>
