<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>StayFlow | Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;background:#06101b;overflow:hidden;color:#fff}
body:before{content:"";position:fixed;inset:0;opacity:.22;
background:url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg') center/cover no-repeat,
radial-gradient(circle at center,rgba(27,121,255,.18),transparent 60%);
filter:hue-rotate(180deg) brightness(.7);}
.card{position:relative;z-index:1;width:460px;background:rgba(8,12,20,.9);border:1px solid #233652;border-radius:28px;padding:42px;backdrop-filter:blur(16px)}
.brand{display:flex;align-items:center;justify-content:center;gap:0px;margin-bottom:22px}
.brand img{width:128px}
.brand h1{font-size:34px}.brand h1 span{color:#2f7dff}
h2{text-align:center;margin-bottom:6px}p{text-align:center;color:#9fb1c9;margin-bottom:24px}
label{display:block;margin:16px 0 8px}
input{width:100%;padding:15px;border-radius:15px;border:1px solid #233652;background:#0d1421;color:#fff}
button{width:100%;margin-top:24px;padding:16px;border:none;border-radius:16px;background:#2f7dff;color:#fff;font-weight:700}
.links{display:flex;justify-content:space-between;margin-top:22px}.links a{color:#8fb4ff;text-decoration:none}
#error{color:#ff8b8b;text-align:center;min-height:20px;margin-top:10px}
</style></head><body>
<div class="card">
<div class="brand"><img src="assets/images/logo2.png" style="margin-right:-28px"><h1>STAY<span>FLOW</span></h1></div>
<h2>Bem-vindo de volta!</h2><p>Entre para acessar sua operação.</p>
<label>E-mail</label><input id="email" placeholder="Digite seu e-mail">
<label>Senha</label><input id="password" type="password" placeholder="Digite sua senha">
<button onclick="login()">Entrar</button><div id="error"></div>
<div class="links"><a href="#">Esqueci minha senha</a><a href="Register.html">Criar conta</a></div>
</div>
<script>
async function login(){
const email=emailEl=document.getElementById('email').value.trim();
const password=document.getElementById('password').value;
const e=document.getElementById('error');e.textContent='';
try{
const r=await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
const d=await r.json();
if(!r.ok||!d.success){e.textContent=d.message||'Login inválido';return;}
localStorage.setItem('stayflowUser',JSON.stringify(d.user));
location.href='/app';
}catch{e.textContent='Erro ao conectar ao servidor.';}
}
</script></body></html>
