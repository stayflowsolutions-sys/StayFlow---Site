body{

.sidebar{

border-right:1px solid #1b8cff55;

padding:20px;

.sidebar.open{

.overlay{

position:fixed;

.overlay.show{

display:block;

.logo-img{

width:150px;

.brand{

.menu button{

border:0;

padding:12px;

text-align:left;

border-radius:12px;

cursor:pointer;

}



.menu button.active{

background:#1b8cff22;

}



.topbar{

height:75px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

border-bottom:1px solid #ffffff15;

}



.content{

padding:25px;

}




.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:18px;

}




.card{

background:#0b0b0b;

border:1px solid #1b8cff33;

border-radius:20px;

padding:20px;

}




.page{

display:none;

}



.page.active{

display:block;

}



.value{

font-size:30px;

color:#1b8cff;

font-weight:bold;

}



.lang span{

cursor:pointer;

margin:5px;

}

function applyLanguage(lang){


localStorage.setItem(
"stayflow_lang",
lang
);



document
.querySelectorAll("[data-i18n]")
.forEach(el=>{


let key =
el.dataset.i18n;


if(translations[lang][key]){

el.innerHTML =
translations[lang][key];

}


});


}





function changeLang(lang){

applyLanguage(lang);

}






applyLanguage(
localStorage.getItem("stayflow_lang") || "pt"
);








function toggleMenu(){

document
.getElementById("sidebar")
.classList.toggle("open");


document
.getElementById("overlay")
.classList.toggle("show");


}






document
.getElementById("overlay")
.onclick=function(){

toggleMenu();

};







function openPage(id,btn){


document
.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));


document
.getElementById(id)
.classList.add("active");



document
.querySelectorAll(".menu button")
.forEach(b=>b.classList.remove("active"));



btn.classList.add("active");



document
.getElementById("pageTitle")
.dataset.i18n=id;


applyLanguage(
localStorage.getItem("stayflow_lang") || "pt"
);


toggleMenu();

}




function updateClock(){

let now =
new Date()
.toLocaleTimeString([],{

hour:"2-digit",
minute:"2-digit"

});


document.title =
"StayFlow • "+now;

}


setInterval(updateClock,1000);

updateClock();
