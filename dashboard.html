.sidebar{

.topbar{

.menu-icon{

.content{

.cards{

.lang span{

margin:5px;

.action{

border:0;

color:white;

padding:10px 15px;

border-radius:12px;

cursor:pointer;

function applyLanguage(code){


localStorage.setItem(
"stayflow_language",
code
);



document
.querySelectorAll("[data-i18n]")
.forEach(el=>{


let key =
el.dataset.i18n;


if(translations[code][key]){

el.innerHTML =
translations[code][key];

}


});


}





function changeLang(code){

applyLanguage(code);

}





applyLanguage(
localStorage.getItem("stayflow_language") || "pt"
);






function toggleMenu(){


document
.getElementById("sidebar")
.classList.toggle("open");

document
.getElementById("overlay")
.classList.toggle("show");


}





function openPage(page,btn){


document
.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));



document
.getElementById(page)
.classList.add("active");



document
.querySelectorAll(".menu button")
.forEach(b=>b.classList.remove("active"));



btn.classList.add("active");



document
.getElementById("pageTitle")
.dataset.i18n=page;



applyLanguage(
localStorage.getItem("stayflow_language") || "pt"
);



toggleMenu();

}
