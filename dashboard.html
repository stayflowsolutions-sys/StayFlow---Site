.sidebar{

.overlay{

.profile,

.menu button{

width:100%;
padding:12px;
background:none;

color:white;

border-radius:12px;

}



.menu button.active,

.topbar{

height:75px;
display:flex;

padding:0 25px;
border-bottom:1px solid #ffffff15;

}


.menu-icon{

.content{
padding:25px;
}


.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;

}



.page{
display:none;
}


.page.active{

}


.value{

.lang span{
cursor:pointer;
margin:5px;
}


.action{

border:0;
padding:10px 15px;

function applyLanguage(code){


localStorage.setItem(
"stayflow_language",
code
);



document
.querySelectorAll("[data-i18n]")
.forEach(el=>{


const key =
el.getAttribute("data-i18n");


if(
translations[code] &&
translations[code][key]
){


el.innerHTML =
translations[code][key];


}



});



}






function changeLang(code){

applyLanguage(code);

}






let savedLanguage =
localStorage.getItem("stayflow_language")
||
"pt";


applyLanguage(savedLanguage);









/* MENU */


const sidebar =
document.getElementById("sidebar");


const overlay =
document.getElementById("overlay");



function toggleMenu(){


sidebar.classList.toggle("open");

overlay.classList.toggle("show");


}



overlay.onclick=function(){


sidebar.classList.remove("open");

overlay.classList.remove("show");


};









function openPage(id,button){



document
.querySelectorAll(".page")
.forEach(page=>{

page.classList.remove("active");

});



document
.getElementById(id)
.classList.add("active");



document
.querySelectorAll(".menu button")
.forEach(btn=>{

btn.classList.remove("active");

});


button.classList.add("active");



document
.getElementById("pageTitle")
.setAttribute(
"data-i18n",
id
);



applyLanguage(
localStorage.getItem("stayflow_language") || "pt"
);



toggleMenu();


}









/* HORA REAL */


function updateClock(){


let time =
new Date()
.toLocaleTimeString([],{

hour:"2-digit",
minute:"2-digit"

});



document.title =
"StayFlow • "+time;


}


setInterval(updateClock,1000);

updateClock();
