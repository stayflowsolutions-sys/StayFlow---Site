<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login · StayFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="static/css/tokens.css">
  <link rel="stylesheet" href="static/css/reset.css">
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body>
  <div class="auth-card">
    <div class="logo">
      <img src="assets/images/logo2.png" alt="StayFlow">
      <h1>Stay<span>Flow</span></h1>
      <p>Smart Stay Solutions</p>
    </div>

    <h2>Entrar</h2>
    <p>Use o email e a senha cadastrados para acessar o painel StayFlow.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>

      <label for="password">Senha</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit" class="auth-btn">Entrar</button>
    </form>

    <div id="loginMessage" class="error"></div>

    <div class="small">
      Ainda não tem acesso? Fale com o administrador do hostel para criar um usuário.
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const msg  = document.getElementById("loginMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      if (!email || !password){
        msg.textContent = "Preencha email e senha.";
        return;
      }

      try{
        const res = await fetch("/login", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.success){
          msg.textContent = data.message || "Email ou senha inválidos.";
          return;
        }

        // Guarda o usuário no localStorage (simples) para uso no front
        localStorage.setItem("stayflow_user", JSON.stringify(data.user));

        // Redireciona para o dashboard servido pelo Flask
        window.location.href = "/app";


      }catch(err){
        console.error(err);
        msg.textContent = "Erro ao tentar logar. Tente novamente.";
      }
    });
  </script>
</body>
</html>
