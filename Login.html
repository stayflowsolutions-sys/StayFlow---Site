<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>StayFlow | Client Login</title>



<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
}



body{

min-height:100vh;

background:#050505;

color:white;

font-family:Arial, Helvetica, sans-serif;

display:flex;

align-items:center;

justify-content:center;

overflow:hidden;

}




body::before{

content:"";

position:fixed;

inset:0;

border:1px solid rgba(13,110,253,.18);

box-shadow:
inset 0 0 18px rgba(13,110,253,.06);

pointer-events:none;

}




body::after{

content:"";

position:fixed;

top:-300px;

left:50%;

transform:translateX(-50%);


width:800px;

height:800px;



background:
radial-gradient(
circle,
rgba(13,110,253,.12),
transparent 70%
);


pointer-events:none;

}





.login-wrapper{

width:100%;

max-width:430px;

padding:25px;

position:relative;

z-index:2;

}





.login-brand{

text-align:center;

font-size:42px;

font-weight:bold;

margin-bottom:35px;

}



.login-brand span{

color:#0D6EFD;

}








.login-card{


background:#0d0f14;

border:1px solid #1b2535;

border-radius:30px;

padding:40px;


box-shadow:

0 0 45px rgba(13,110,253,.12);

}






.login-card h1{

font-size:32px;

margin-bottom:12px;

}





.login-subtitle{

color:#9ba3b2;

line-height:1.6;

margin-bottom:35px;

}







.login-label{

display:block;

font-size:14px;

color:#9ba3b2;

margin-bottom:8px;

}







.login-input{

width:100%;

padding:16px;

background:#050505;

border:1px solid #1b2535;

border-radius:15px;

color:white;

font-size:16px;

margin-bottom:20px;

outline:none;

}





.login-input:focus{

border-color:#0D6EFD;

}









.login-submit{


width:100%;


padding:17px;


border:none;


border-radius:50px;


background:#0D6EFD;


color:white;


font-size:18px;


font-weight:bold;


cursor:pointer;



box-shadow:

0 0 25px rgba(13,110,253,.35);

}








.login-links{

margin-top:25px;

display:flex;

flex-direction:column;

align-items:center;

gap:15px;

}





.login-links a{

color:#9ba3b2;

text-decoration:none;

font-size:14px;

}





.login-links a:hover{

color:white;

}







@media(max-width:500px){


.login-card{

padding:30px;

}


.login-brand{

font-size:36px;

}


}





</style>


</head>



<body>





<div class="login-wrapper">

<!-- LOGIN CARD -->


<div class="login-card">



<h1>

Welcome Back

</h1>





<p class="login-subtitle">

Access your StayFlow workspace
and manage your hostel operations.

</p>






<form>





<label class="login-label">

Email

</label>





<input

class="login-input"

type="email"

placeholder="you@hostel.com"

>







<label class="login-label">

Password

</label>





<input

class="login-input"

type="password"

placeholder="Enter your password"

>







<button

class="login-submit"

type="submit">

Sign In

</button>






</form>









<div class="login-links">





<a href="#">

Forgot password?

</a>







<a href="index.html">

← Back to StayFlow website

</a>







</div>







</div>







</div>








</body>

</html>
