<!-- =========================================================
     SETTINGS PAGE - STAYFLOW HYBRID V2 (FINAL)
     INSIDE: dashboard.html -> #settings page
     ========================================================= -->

<div class="grid">

  <!-- LEFT SIDEBAR NAV -->
  <div class="card span-3">

    <h2>⚙ Settings</h2>

    <p class="muted">Control Center do StayFlow</p>

    <div style="display:grid;gap:10px;margin-top:14px">

      <button class="btn secondary">Geral</button>
      <button class="btn secondary">Empresa</button>
      <button class="btn secondary">IA</button>
      <button class="btn secondary">Comunicação</button>
      <button class="btn secondary">Integrações</button>
      <button class="btn secondary">Equipe</button>
      <button class="btn secondary">Segurança</button>
      <button class="btn secondary">Billing</button>
      <button class="btn secondary">Developer</button>

    </div>

  </div>

  <!-- RIGHT CONTENT AREA -->
  <div class="span-9">

    <!-- STATUS HEADER -->
    <div class="card">

      <h2>System Status</h2>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">

        <span class="status-pill ok">System Online</span>
        <span class="status-pill ok">IA ativa</span>
        <span class="status-pill ok">WhatsApp conectado</span>
        <span class="status-pill ok">Segurança 94%</span>

      </div>

    </div>

    <!-- KPI STRIP (CLEAN PREMIUM STYLE) -->
    <div class="grid" style="margin-top:12px">

      <div class="card span-3">
        <h3>IA</h3>
        <p class="muted">Operacional</p>
      </div>

      <div class="card span-3">
        <h3>Reservas</h3>
        <p class="muted">Sincronizadas</p>
      </div>

      <div class="card span-3">
        <h3>Integrações</h3>
        <p class="muted">12 ativas</p>
      </div>

      <div class="card span-3">
        <h3>Equipe</h3>
        <p class="muted">4 usuários</p>
      </div>

    </div>

    <!-- GENERAL SETTINGS -->
    <div class="card" style="margin-top:12px">

      <h2>Geral</h2>

      <div class="grid">

        <input placeholder="Nome do hostel">
        <input placeholder="Tipo de propriedade">

        <input placeholder="Check-in padrão">
        <input placeholder="Check-out padrão">

      </div>

    </div>

    <!-- IA SETTINGS (CORE FEATURE) -->
    <div class="card" style="margin-top:12px">

      <h2>IA StayFlow</h2>

      <div style="display:grid;gap:12px;margin-top:10px">

        <label style="display:flex;justify-content:space-between;align-items:center">
          <span>Resposta automática</span>
          <input type="checkbox">
        </label>

        <label style="display:flex;justify-content:space-between;align-items:center">
          <span>Geração de oportunidades</span>
          <input type="checkbox">
        </label>

        <label style="display:flex;justify-content:space-between;align-items:center">
          <span>Tom de resposta profissional</span>
          <input type="checkbox">
        </label>

      </div>

    </div>

    <!-- INTEGRATIONS (LIGHTWEIGHT PREMIUM GRID) -->
    <div class="card" style="margin-top:12px">

      <h2>Integrações</h2>

      <div class="grid" style="margin-top:10px">

        <div class="card span-3">WhatsApp</div>
        <div class="card span-3">Instagram</div>
        <div class="card span-3">Facebook</div>
        <div class="card span-3">Booking</div>
        <div class="card span-3">Airbnb</div>
        <div class="card span-3">Google</div>

      </div>

    </div>

    <!-- ACTION BAR -->
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:16px">

      <button class="btn secondary">Cancelar</button>
      <button class="btn">Salvar alterações</button>

    </div>

  </div>

</div>
